; SpoolID firmware - Seeed XIAO ESP32-C3 + RC522 Creality RFID writer
[platformio]
default_envs = xiao_esp32c3
data_dir = data

[env:xiao_esp32c3]
platform = espressif32@^7.0.1
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
; XIAO ESP32-C3 uses the built-in USB-Serial-JTAG. Don't let the monitor toggle
; DTR/RTS or it can hold the chip in reset/bootloader and show nothing.
monitor_rts = 0
monitor_dtr = 0
; USB CDC on boot so Serial works over the native USB port for the desktop app.
; Version: release CI injects -DFW_VERSION from the tag via PLATFORMIO_BUILD_FLAGS;
; local builds fall back to the 0.0.0-dev default in src/version.h.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
; LittleFS for the gzipped web assets + persisted material DB.
board_build.filesystem = littlefs
; OTA-capable partition table (two 1.5MB app slots + LittleFS) on 4 MB flash.
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
lib_deps =
    miguelbalboa/MFRC522@^1.4.12
    esp32async/ESPAsyncWebServer@^3.11.2
    esp32async/AsyncTCP@^3.4.10
    bblanchon/ArduinoJson@^7.4.3
