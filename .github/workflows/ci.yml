name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      firmware: ${{ steps.filter.outputs.firmware }}
      web: ${{ steps.filter.outputs.web }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            firmware:
              - 'firmware/**'
              - 'tools/gen_db_header.py'
              - 'material_database.json'
            web:
              - 'web/**'
              - 'tools/build_web.py'
              - 'tools/gen_db_header.py'
              - 'material_database.json'
            desktop:
              - 'desktop/**'

  firmware:
    needs: changes
    if: needs.changes.outputs.firmware == 'true'
    name: Build firmware (ESP32-C3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
      - name: Install PlatformIO
        run: pip install platformio
      - name: Prepare generated + secret files
        run: |
          python tools/gen_db_header.py
          cp firmware/include/secrets.h.example firmware/include/secrets.h
      - name: Build
        run: pio run -d firmware

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    name: Build web assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate DB header + gzip web assets
        run: |
          python tools/gen_db_header.py
          python tools/build_web.py

  desktop:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    name: Lint desktop app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -r desktop/requirements.txt
      - name: Byte-compile
        run: python -m compileall desktop/spoolid
      - name: Import smoke
        run: PYTHONPATH=desktop python -c "import spoolid.tui, spoolid.serial_link, spoolid.material_db"
